services:
  # ==============================================================
  # SQL Server Databases (one per microservice)
  # ==============================================================

  sql-travelbooking:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-travelbooking
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_TRAVELBOOKING_HOST_PORT:-1433}:1433"
    volumes:
      - sql-travelbooking-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-eventmanagement:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-eventmanagement
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_EVENTMANAGEMENT_HOST_PORT:-1434}:1433"
    volumes:
      - sql-eventmanagement-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-payment:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-payment
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_PAYMENT_HOST_PORT:-1435}:1433"
    volumes:
      - sql-payment-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-notification:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-notification
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_NOTIFICATION_HOST_PORT:-1436}:1433"
    volumes:
      - sql-notification-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql-reporting:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-reporting
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_REPORTING_HOST_PORT:-1437}:1433"
    volumes:
      - sql-reporting-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==============================================================
  # Azure Service Bus Emulator
  # ==============================================================

  sql-servicebus:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-servicebus
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    volumes:
      - sql-servicebus-data:/var/opt/mssql
    networks:
      - travelbookings-net
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    profiles: [infra, backend, frontend, full]
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sql-servicebus
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    volumes:
      - ./servicebus-emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "${SERVICEBUS_HOST_PORT:-5672}:5672"
    depends_on:
      sql-servicebus:
        condition: service_healthy
    networks:
      - travelbookings-net
    healthcheck:
      test: /bin/sh -c "curl -f http://localhost:5672 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ==============================================================
  # Microservices
  # ==============================================================

  travelbooking-api:
    build:
      context: .
      dockerfile: src/Services/TravelBooking/Dockerfile
      target: prod
    container_name: travelbooking-api
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sql-travelbooking;Database=TravelBookings_TravelBooking;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"
    ports:
      - "${TRAVELBOOKING_HOST_PORT:-5001}:8080"
    depends_on:
      sql-travelbooking:
        condition: service_healthy
      servicebus-emulator:
        condition: service_healthy
    networks:
      - travelbookings-net

  eventmanagement-api:
    build:
      context: .
      dockerfile: src/Services/EventManagement/Dockerfile
      target: prod
    container_name: eventmanagement-api
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sql-eventmanagement;Database=TravelBookings_EventManagement;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"
    ports:
      - "${EVENTMANAGEMENT_HOST_PORT:-5002}:8080"
    depends_on:
      sql-eventmanagement:
        condition: service_healthy
      servicebus-emulator:
        condition: service_healthy
    networks:
      - travelbookings-net

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/Dockerfile
      target: prod
    container_name: payment-api
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sql-payment;Database=TravelBookings_Payment;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"
    ports:
      - "${PAYMENT_HOST_PORT:-5003}:8080"
    depends_on:
      sql-payment:
        condition: service_healthy
      servicebus-emulator:
        condition: service_healthy
    networks:
      - travelbookings-net

  notification-api:
    build:
      context: .
      dockerfile: src/Services/Notification/Dockerfile
      target: prod
    container_name: notification-api
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sql-notification;Database=TravelBookings_Notification;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"
    ports:
      - "${NOTIFICATION_HOST_PORT:-5004}:8080"
    depends_on:
      sql-notification:
        condition: service_healthy
      servicebus-emulator:
        condition: service_healthy
    networks:
      - travelbookings-net

  reporting-api:
    build:
      context: .
      dockerfile: src/Services/Reporting/Dockerfile
      target: prod
    container_name: reporting-api
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sql-reporting;Database=TravelBookings_Reporting;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true"
    ports:
      - "${REPORTING_HOST_PORT:-5005}:8080"
    depends_on:
      sql-reporting:
        condition: service_healthy
      servicebus-emulator:
        condition: service_healthy
    networks:
      - travelbookings-net

  # ==============================================================
  # YARP API Gateway
  # ==============================================================

  gateway-api:
    build:
      context: .
      dockerfile: src/Gateway/Dockerfile
      target: prod
    container_name: gateway-api
    profiles: [backend, frontend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    networks:
      - travelbookings-net

  # ==============================================================
  # Frontend (React SPA)
  # ==============================================================

  frontend:
    build:
      context: .
      dockerfile: src/Frontend/Dockerfile
      target: prod
    container_name: frontend
    profiles: [frontend, full]
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - gateway-api
    networks:
      - travelbookings-net

volumes:
  sql-travelbooking-data:
  sql-eventmanagement-data:
  sql-payment-data:
  sql-notification-data:
  sql-reporting-data:
  sql-servicebus-data:

networks:
  travelbookings-net:
    driver: bridge
